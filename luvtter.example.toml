# Luvtter 应用本地配置示例
# 复制为 `luvtter.toml`(放在仓库根目录 / 工作目录,或 ~/.config/luvtter/luvtter.toml)
# 也可以用环境变量 LUVTTER_CONFIG=/abs/path/to/file.toml 指定。
# 全部字段可选,缺省走代码默认值。Android/iOS 当前不读外部文件。

[server]
# 留空字符串 → 沿用平台默认(Desktop=http://localhost:8080,Android=http://10.0.2.2:8080,iOS=http://localhost:8080)
baseUrl = ""

[devAuth]
# 开发期登录页自动填充测试账号。生产请勿提交。
enabled = false
email = ""
password = ""

[features]
# 寄件箱「加 速 到 达」按钮(把在途信件压缩到 N 秒后送达,仅供测试)
showExpedite = true
