name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

jobs:
  # 服务端集成测试:Postgres 16 + MinIO testcontainers,需要 Docker(ubuntu runner 自带)。
  server-test:
    name: Server tests (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Run :server:test
        run: ./gradlew :server:test --no-daemon --stacktrace

      # 验证 CLI 也能编译 + 打进 application 发行包(bin/luvtter-cli + bin/luvtter-server)
      - name: Verify server + cli distribution build
        run: ./gradlew :server:installDist --no-daemon --stacktrace

      - name: Smoke-check distribution layout
        run: |
          set -e
          BIN="server/build/install/luvtter-server/bin"
          for f in luvtter-server luvtter-server.bat luvtter-cli luvtter-cli.bat; do
            test -e "$BIN/$f" || { echo "::error::missing $BIN/$f"; ls -la "$BIN" || true; exit 1; }
          done
          echo "OK: server + cli scripts present"

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-reports
          path: |
            server/build/reports/tests/test
            server/build/test-results/test
          retention-days: 7

  # 客户端 KMP 编译:Desktop + Android(commonMain)+ iOS commonMain klib。
  # 不打包 androidApp APK 以节省时间;那一步走 android-package job。
  client-compile:
    name: Client KMP compile (Desktop + Android + iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Compile Desktop / Android main / iOS X64 klib
        run: |
          ./gradlew \
            :composeApp:compileKotlinDesktop \
            :composeApp:compileAndroidMain \
            :composeApp:compileKotlinIosX64 \
            :composeApp:compileKotlinIosSimulatorArm64 \
            --no-daemon --stacktrace

  # androidApp 完整 APK 打包(覆盖资源链接 / dex / packaging)。
  android-package:
    name: Android assembleDebug
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: androidApp-debug
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7
