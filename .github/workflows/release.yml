name: Release

# 在 main 分支打 v* tag(例如 v0.1.0 / v1.2.3-beta1)即触发:
# 1. 服务端 Ktor fat jar
# 2. Android debug APK(unsigned;真要走 Play 需另起带签名的 release flow)
# 3. Desktop 三平台原生包(Linux .deb / macOS .dmg / Windows .msi)
# 全部 artifact 直接挂到 GitHub Release。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write  # 创建 / 更新 Release + 上传 asset

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

jobs:
  guard-main:
    name: Guard:tag must point at main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify tag commit is on main
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          git fetch --no-tags --depth=1 origin main
          TAG_SHA=$(git rev-list -n 1 "$TAG")
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "::error::Tag $TAG ($TAG_SHA) is not reachable from origin/main; refusing to release."
            exit 1
          fi
          echo "Tag $TAG -> $TAG_SHA is on main."

  server-jar:
    name: Server fat jar + dist (server + cli scripts)
    needs: guard-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build server fat jar + distribution
        run: ./gradlew :server:buildFatJar :server:distTar --no-daemon --stacktrace
      - name: Stage artifacts
        run: |
          set -e
          mkdir -p release-artifacts
          TAG="${{ github.event.inputs.tag || github.ref_name }}"

          # 1) Ktor fat jar(单文件,直接 java -jar 启动服务,或 java -cp ... LuvtterCliKt 跑 CLI)
          cp server/build/libs/luvtter-server-*-all.jar \
             "release-artifacts/luvtter-server-${TAG}.jar"

          # 2) application distribution(bin/luvtter-server + bin/luvtter-cli + lib/),解压即跑
          cp server/build/distributions/luvtter-server-*.tar \
             "release-artifacts/luvtter-server-${TAG}-dist.tar"
          gzip -9 "release-artifacts/luvtter-server-${TAG}-dist.tar"
      - uses: actions/upload-artifact@v4
        with:
          name: server-bundle
          path: release-artifacts/*
          retention-days: 1

  android-apk:
    name: Android debug APK
    needs: guard-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Assemble debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace
      - name: Stage artifact
        run: |
          mkdir -p release-artifacts
          # assembleDebug 默认产出 universal APK,内含所有 ABI(armeabi-v7a/arm64-v8a/x86/x86_64)
          cp androidApp/build/outputs/apk/debug/*.apk \
             "release-artifacts/luvtter-android-${{ github.event.inputs.tag || github.ref_name }}-universal-debug.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release-artifacts/*.apk
          retention-days: 1

  desktop-natives:
    name: Desktop native package (${{ matrix.label }})
    needs: guard-main
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-latest = x86_64 Linux
          - os: ubuntu-latest
            label: linux-x86_64
            format: deb
            task: packageDeb
            ext: deb
          # macos-latest = Apple Silicon (arm64);Intel Mac 用户需另起 macos-13 矩阵项
          - os: macos-latest
            label: macos-arm64
            format: dmg
            task: packageDmg
            ext: dmg
          # windows-latest = x86_64 Windows
          - os: windows-latest
            label: windows-x86_64
            format: msi
            task: packageMsi
            ext: msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Build ${{ matrix.format }} package
        run: ./gradlew :composeApp:${{ matrix.task }} --no-daemon --stacktrace
        shell: bash
      # packageDeb / packageDmg / packageMsi 不触发 createDistributable,
      # 仅 Linux 需要这份 self-contained 目录用来打 tar.gz 给 AUR。
      - name: Build createDistributable (Linux only, for AUR tarball)
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew :composeApp:createDistributable --no-daemon --stacktrace
        shell: bash
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p release-artifacts
          # Compose Desktop 把产物丢在 build/compose/binaries/main/<format>/
          src=$(find composeApp/build/compose/binaries -type f -name "*.${{ matrix.ext }}" | head -n 1)
          if [ -z "$src" ]; then echo "::error::no .${{ matrix.ext }} produced"; exit 1; fi
          cp "$src" "release-artifacts/luvtter-desktop-${{ github.event.inputs.tag || github.ref_name }}-${{ matrix.label }}.${{ matrix.ext }}"
      # 仅 Linux 多产一份 createDistributable 的 tar.gz —— 给 AUR 用,Arch 友好
      # packageDeb 会触发 createDistributable,所以产物已经在 build/compose/binaries/main/app/letter-app/
      - name: Pack createDistributable tarball (Linux only)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          APP_DIR="composeApp/build/compose/binaries/main/app"
          if [ ! -d "$APP_DIR/letter-app" ]; then
            echo "::error::createDistributable output not found at $APP_DIR/letter-app"
            ls -la "$APP_DIR" || true
            exit 1
          fi
          tar -C "$APP_DIR" -czf \
            "release-artifacts/luvtter-desktop-${{ github.event.inputs.tag || github.ref_name }}-${{ matrix.label }}.tar.gz" \
            letter-app
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: release-artifacts/*
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [server-jar, android-apk, desktop-natives]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: List artifacts
        run: ls -lh release-artifacts
      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*.jar
            release-artifacts/*.apk
            release-artifacts/*.deb
            release-artifacts/*.dmg
            release-artifacts/*.msi
            release-artifacts/*.tar.gz

  aur-publish:
    name: Publish AUR (luvtter-desktop-bin)
    needs: publish
    runs-on: ubuntu-latest
    # 1) 预发布(tag 含 '-',如 v0.1.0-beta1)不推 AUR
    # 2) fork 没配 AUR_SSH_PRIVATE_KEY 时整个 job 跳过,而不是 fail 主 release
    if: ${{ !contains(github.event.inputs.tag || github.ref_name, '-') && github.repository == 'Emiya173/luvtter' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag / version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VER="${TAG#v}"
          echo "tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "pkgver=$VER"  >> "$GITHUB_OUTPUT"

      - name: Wait for release asset to be downloadable
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.ver.outputs.tag }}/luvtter-desktop-${{ steps.ver.outputs.tag }}-linux-x86_64.tar.gz"
          for i in 1 2 3 4 5 6; do
            if curl -sfLI "$URL" >/dev/null; then
              echo "asset ready: $URL"; exit 0
            fi
            echo "asset not ready yet (try $i), sleeping 10s..."
            sleep 10
          done
          echo "::error::release asset never became downloadable: $URL"; exit 1

      # 不再用第三方 action(KSXGitHub/github-actions-deploy-aur 在 2.7.x 有 bash 选项 bug)
      # 改成内联步骤:配 SSH → clone AUR repo → 注入 pkgver / sha256 → push。
      # 整个过程不用 makepkg / updpkgsums(后者要 Arch 容器),sha256 直接对 GitHub Release tar.gz 算。
      - name: Configure SSH for AUR
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # secret 必须以换行结尾(OpenSSH 私钥格式严格);printf '%s\n' 兜底
          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ecdsa,ed25519 aur.archlinux.org > ~/.ssh/known_hosts 2>/dev/null
          chmod 600 ~/.ssh/known_hosts
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
              User aur
              IdentityFile ~/.ssh/aur
              IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone AUR repo
        run: |
          git clone ssh://aur@aur.archlinux.org/luvtter-desktop-bin.git /tmp/aur-pkg
          cd /tmp/aur-pkg
          git config user.name  "${{ secrets.AUR_USERNAME || 'Emiya173' }}"
          git config user.email "${{ secrets.AUR_EMAIL || 'emiyazero173@gmail.com' }}"

      - name: Compose PKGBUILD + .SRCINFO with real pkgver / sha256
        run: |
          set -euo pipefail
          PV="${{ steps.ver.outputs.pkgver }}"
          TAG="${{ steps.ver.outputs.tag }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/luvtter-desktop-${TAG}-linux-x86_64.tar.gz"

          echo "Downloading tarball to compute sha256..."
          SHA=$(curl -sfL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256 = $SHA"

          # 复制模板进 AUR clone 目录
          cp aur/luvtter-desktop-bin/{PKGBUILD,luvtter-desktop.desktop,.SRCINFO} /tmp/aur-pkg/
          cd /tmp/aur-pkg

          # 1) PKGBUILD: pkgver + tar.gz 的 sha256(数组第一项,.desktop 留 SKIP)
          sed -i "s/^pkgver=.*/pkgver=${PV}/" PKGBUILD
          # sha256sums=('SKIP'\n            'SKIP') —— 替换第一行的 'SKIP'
          sed -i "0,/sha256sums=('SKIP'/{s|sha256sums=('SKIP'|sha256sums=('${SHA}'|}" PKGBUILD

          # 2) .SRCINFO: 同步 pkgver + 第一处 sha256sums = SKIP
          sed -i "s|^\tpkgver = .*|\tpkgver = ${PV}|" .SRCINFO
          sed -i "s|v0.0.0|v${PV}|g" .SRCINFO
          sed -i "0,/\tsha256sums = SKIP/{s|\tsha256sums = SKIP|\tsha256sums = ${SHA}|}" .SRCINFO

          echo "--- PKGBUILD ---"; cat PKGBUILD
          echo "--- .SRCINFO ---"; cat .SRCINFO

      - name: Commit and push to AUR
        run: |
          cd /tmp/aur-pkg
          git add PKGBUILD .SRCINFO luvtter-desktop.desktop
          if git diff --cached --quiet; then
            echo "Nothing to commit (PKGBUILD already up-to-date for ${{ steps.ver.outputs.tag }})"
            exit 0
          fi
          git commit -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin master
