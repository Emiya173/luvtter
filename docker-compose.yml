  #     postgres:
  #       condition: service_healthy
  #     minio:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: jdbc:postgresql://postgres:5432/letter
  #     DATABASE_USER: letter
  #     DATABASE_PASSWORD: letter
  #     S3_ENDPOINT: http://minio:9000
  #     S3_ACCESS_KEY: minioadmin
  #     S3_SECRET_KEY: minioadmin
  #     JWT_SECRET: dev-secret-change-me
  #   ports:
  #     - "8080:8080"

volumes:
  pg-data:
  minio-data:
