ktor:
  application:
    modules:
      - com.luvtter.server.ApplicationKt.module
  deployment:
    port: 8080
    host: 0.0.0.0
  development: true

database:
  url: "${DATABASE_URL:jdbc:postgresql://localhost:5432/letter}"
  user: "${DATABASE_USER:letter}"
  password: "${DATABASE_PASSWORD:letter}"
  maxPoolSize: 10

storage:
  endpoint: "${S3_ENDPOINT:http://localhost:9000}"
  accessKey: "${S3_ACCESS_KEY:minioadmin}"
  secretKey: "${S3_SECRET_KEY:minioadmin}"
  bucket: "${S3_BUCKET:letter}"

notifications:
  heartbeatSeconds: "${SSE_HEARTBEAT_SECONDS:25}"

tasks:
  pollMillis: "${TASKS_POLL_MILLIS:2000}"
  # 默认 true: Kotlin AsyncTaskRunner 处理 ocr_index(写占位文本,搜索可用)
  # 部署 image-worker 时设为 false,把 ocr_index 让给 Python worker
  useStubOcr: "${USE_STUB_OCR:true}"

auth:
  # 是否允许 HTTP 注册接口可用。设为 false 后,/api/v1/auth/register 一律返回 403,
  # 此时只能通过 server CLI(./gradlew :server:cli --args="register-user ...")在本机创建账号。
  allowRegistration: "${AUTH_ALLOW_REGISTRATION:false}"

jwt:
  secret: "${JWT_SECRET:dev-secret-change-me}"
  issuer: "letter-app"
  audience: "letter-app-users"
  realm: "letter"
  accessTokenTtlSeconds: 3600
  refreshTokenTtlDays: 30
